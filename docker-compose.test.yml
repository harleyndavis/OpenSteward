services:
  db-test:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: opensteward_test
      POSTGRES_USER: opensteward
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opensteward"]
      interval: 5s
      timeout: 5s
      retries: 5
