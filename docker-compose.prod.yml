services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: opensteward
      POSTGRES_USER: opensteward
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opensteward"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: prod
    environment:
      DATABASE_URL: postgresql://opensteward:${POSTGRES_PASSWORD}@db:5432/opensteward
      APP_PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      target: prod
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  postgres_data:
